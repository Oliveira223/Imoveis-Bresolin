services:
  bresolin_app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bresolin_app
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      bresolin_db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  bresolin_db:
    image: postgres:16
    container_name: bresolin_db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
