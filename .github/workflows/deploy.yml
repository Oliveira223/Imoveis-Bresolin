name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "[INFO] Criando backup do banco..."
            mkdir -p ~/backups
            docker exec bresolin_db pg_dump -U admin bresolin_db > ~/backups/backup_$(date +'%Y%m%d_%H%M%S').dump

            echo "[INFO] Atualizando aplicação..."
            cd ~/Imoveis-Bresolin
            git fetch origin
            git reset --hard origin/main

            echo "[INFO] Reconstruindo containers..."
            docker compose up -d --build

            echo "[INFO] Deploy finalizado com sucesso!"
